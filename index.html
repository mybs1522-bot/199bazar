    <style>
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: #f5f5f5; }
      ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
      ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      html { scroll-behavior: auto; }

      .gradient-text {
        background: linear-gradient(135deg, #2563eb 0%, #60a5fa 50%, #2563eb 100%);
        -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      }

      .grid-bg {
        background-color: #ffffff;
        background-image: 
          linear-gradient(to right, rgba(37, 99, 235, 0.1) 1px, transparent 1px),
          linear-gradient(to bottom, rgba(37, 99, 235, 0.1) 1px, transparent 1px);
        background-size: 40px 40px;
      }

      /* Scroll Reveal */
      .reveal { opacity: 0; transform: translateY(40px); transition: opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1), transform 0.8s cubic-bezier(0.16, 1, 0.3, 1); }
      .reveal.revealed { opacity: 1; transform: translateY(0); }
      .reveal-scale { opacity: 0; transform: scale(0.9); transition: opacity 0.6s ease, transform 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
      .reveal-scale.revealed { opacity: 1; transform: scale(1); }

      /* Scroll Carousel */
      @keyframes scroll-left { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
      @keyframes scroll-right { 0% { transform: translateX(-50%); } 100% { transform: translateX(0); } }
      .animate-scroll-left { display: flex; width: max-content; animation: scroll-left 40s linear infinite; }
      .animate-scroll-right { display: flex; width: max-content; animation: scroll-right 40s linear infinite; }
      .hover\:pause:hover { animation-play-state: paused; }

      /* Flip Clock */
      .flip-clock-group { display: flex; flex-direction: column; align-items: center; gap: 4px; }
      .flip-clock-label { font-size: 9px; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: rgba(255,255,255,0.3); }
      .flip-digit-wrapper { perspective: 200px; }
      .flip-digit {
        width: 36px; height: 48px; background: #1a1a1a; border: 1px solid rgba(255,255,255,0.08);
        border-radius: 8px; display: flex; align-items: center; justify-content: center;
        font-family: 'JetBrains Mono', monospace; font-size: 24px; font-weight: 700; color: white;
        position: relative; overflow: hidden;
      }
      .flip-digit::after { content: ''; position: absolute; top: 50%; left: 0; right: 0; height: 1px; background: rgba(255,255,255,0.06); }
      @media (min-width: 768px) { .flip-digit { width: 48px; height: 64px; font-size: 32px; } }

      /* Premium Stroke */
      @keyframes borderRotate { 0% { --angle: 0deg; } 100% { --angle: 360deg; } }
      @property --angle { syntax: '<angle>'; initial-value: 0deg; inherits: false; }
      .premium-stroke { position: relative; z-index: 1; }
      .premium-stroke::before {
        content: ''; position: absolute; inset: -1px; padding: 1px; border-radius: inherit;
        background: conic-gradient(from var(--angle), transparent 0%, transparent 80%, white 90%, transparent 100%);
        -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
        mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
        -webkit-mask-composite: xor; mask-composite: exclude;
        animation: borderRotate 3s linear infinite; pointer-events: none; z-index: -1;
      }

      /* CTA Sweep */
      .cta-primary { position: relative; overflow: hidden; }
      .cta-primary::after {
        content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
        background: linear-gradient(45deg, transparent 30%, rgba(255,255,255,0.15) 50%, transparent 70%);
        transform: translateX(-100%); transition: transform 0.6s;
      }
      .cta-primary:hover::after { transform: translateX(100%); }

      /* Keyframes */
      @keyframes fadeUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
      @keyframes glowPulse { 0%, 100% { box-shadow: 0 0 20px rgba(37, 99, 235, 0.3); } 50% { box-shadow: 0 0 40px rgba(37, 99, 235, 0.6); } }

      body { background: #ffffff; }

    <div id="root"></div>

  <!-- Scroll reveal observer -->
  <script>
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('revealed');
        }
      });
    }, { threshold: 0.1, rootMargin: '0px 0px -50px 0px' });

    const startObserving = () => {
      document.querySelectorAll('.reveal, .reveal-left, .reveal-right, .reveal-scale').forEach(el => observer.observe(el));
    };

    const mo = new MutationObserver(() => startObserving());
    mo.observe(document.getElementById('root'), { childList: true, subtree: true });
    document.addEventListener('DOMContentLoaded', startObserving);
  </script>
